<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Aarna 3D</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="custom-alert" style="display: none;">
        <span id="alert-text">Room is full!</span>
        <button onclick="closeAlert()">Got it</button>
    </div>

    <div id="controls">
        <h2>Studio Aarna</h2>
        
        <details open>
            <summary>ENVIRONMENT & ROOM</summary>
            <div class="input-group" style="margin-top: 15px;">
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="number" id="roomWidth" value="13" onchange="updateRoom()" style="width: 45%;">
                    <span style="color: white; line-height: 2;">x</span>
                    <input type="number" id="roomLength" value="10" onchange="updateRoom()" style="width: 45%;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px; background: #3f3f52; padding: 10px; border-radius: 8px;">
                    
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0; font-size: 0.75rem;">Floor:</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="floorStyle" onchange="updateRoom()" style="background: #2d2d3a; color: white; border: 1px solid #555; border-radius: 4px; padding: 4px;">
                                <option value="white">White Minimal</option>
                                <option value="wood">Hardwood</option>
                                <option value="carpet">Grey Carpet</option>
                                <option value="tile">Ceramic Tile</option>
                                <option value="custom" id="customFloorOption" style="display: none;">Custom Image</option>
                            </select>
                            <button onclick="document.getElementById('floorUpload').click()" style="background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 0 6px;" title="Upload Floor Decal">🖼️</button>
                            <input type="file" id="floorUpload" accept="image/*" style="display: none;" onchange="applyFloorTexture(event)">
                        </div>
                    </div>
                    
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0; font-size: 0.75rem;">Time of Day:</label>
                        <input type="time" id="timeOfDay" onchange="updateLighting()" style="background: #2d2d3a; color: white; border: 1px solid #555; border-radius: 4px; padding: 2px;">
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0; font-size: 0.75rem;">Wall Color:</label>
                        <input type="color" id="wallColor" value="#3a404d" onchange="updateRoom()" style="padding: 0; width: 25px; height: 25px; border: none; cursor: pointer;">
                        <label style="margin: 0; font-size: 0.75rem; margin-left: 5px;">Opacity:</label>
                        <input type="range" id="wallOpacity" min="0.2" max="1" step="0.1" value="0.9" onchange="updateRoom()" style="width: 50px;">
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="undo()" style="background: #e67e22; color: white; width: 50%;">↺ Undo</button>
                    <button onclick="redo()" style="background: #d35400; color: white; width: 50%;">↻ Redo</button>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="saveRoom()" style="background: #27ae60; color: white; width: 50%;">💾 Save</button>
                    <button onclick="loadRoom()" style="background: #8e44ad; color: white; width: 50%;">📂 Load</button>
                </div>
            </div>
        </details>

        <button onclick="exportBlueprint()" style="background: #f1c40f; color: #333; margin-top: 10px;">📸 Export 3D Snapshot</button>
        <button onclick="clearCanvas()" style="background: #c0392b; color: white; margin-top: 10px;">🗑️ Clear Room</button>
        
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        
        <details open>
            <summary>FURNITURE CATALOG</summary>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 15px;">
                <button class="btn-add" onclick="addItem('Bed', 6.5, 2, 3, '#AED6F1')">+ Bed</button>
                <button class="btn-add" style="background: #3498db;" onclick="addItem('Sofa', 6, 2.5, 2.5, '#7f8c8d')">+ Sofa Couch</button>
                <button class="btn-add" style="background: #9b59b6;" onclick="addItem('Bookshelf', 3, 6, 1, '#5C4033')">+ Tall Bookshelf</button>
                <button class="btn-add" style="background: #e67e22;" onclick="addItem('TV Stand', 4, 3.5, 1.2, '#333333')">+ TV & Stand</button>
                <button class="btn-add" onclick="addItem('Desk', 4, 2.5, 2, '#F9E79F')">+ Desk</button>
                <button class="btn-add" onclick="addItem('Wardrobe', 3, 6, 2, '#F5CBA7')">+ Wardrobe</button>
                <button class="btn-add" onclick="addItem('Rug', 5, 0.05, 7, '#D7BDE2', true)">+ Rug</button>
                
                <hr style="border: 0.5px solid #555; margin: 5px 0;">
                
                <button class="btn-add" style="background: #8e44ad;" onclick="addItem('Curtains', 5, 7, 0.3, '#ffffff', true)">+ Curtains</button>
                <button class="btn-add" style="background: #e74c3c;" onclick="addItem('Poster', 2, 3, 0.05, '#ffffff', true)">+ Poster / Painting</button>
                <button class="btn-add" style="background: #f39c12; color: white;" onclick="addItem('Ceiling Fan', 3, 1, 3, '#333333', true)">💡 Ceiling Fan</button>
                <button class="btn-add" style="background: #f1c40f; color: #333;" onclick="addItem('Wall Light', 1, 1, 0.2, '#ffffff', true)">💡 Wall Light</button>

                <hr style="border: 0.5px solid #555; margin: 5px 0;">
                
                <button class="btn-add" style="background: #95a5a6;" onclick="addItem('Door', 3, 7, 0.2, '#5C4033', true)">+ Add Wood Door</button>
                <button class="btn-add" style="background: #34495e;" onclick="addItem('Balcony Door', 4, 7, 0.2, '#3498db', true)">+ Add Glass Door</button>
                <button class="btn-add" style="background: #1abc9c;" onclick="addItem('Window', 4, 4, 0.2, '#3498db', true)">+ Add Wall Window</button>
                <button class="btn-add" style="background: #27ae60;" onclick="addBalcony()">+ Add Balcony Floor</button> 
            </div>
        </details>

        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        
        <div id="inspector" style="display: none; background: #3f3f52; padding: 15px; border-radius: 8px;">
            <h3 style="margin-top: 0; color: #f39c12; font-size: 1.1rem;">Edit Item</h3>
            <p id="selectedItemName" style="font-weight: bold; margin-bottom: 5px;">Item Name</p>
            
            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                <div>
                    <label>Width</label><br>
                    <input type="number" id="editW_ft" style="width: 35px;" onchange="updateSelectedSize()">
                    <input type="number" id="editW_in" style="width: 35px;" max="11" onchange="updateSelectedSize()">
                </div>
                <div>
                    <label>Height</label><br>
                    <input type="number" id="editH_ft" style="width: 35px;" onchange="updateSelectedSize()">
                    <input type="number" id="editH_in" style="width: 35px;" max="11" onchange="updateSelectedSize()">
                </div>
                <div>
                    <label>Length</label><br>
                    <input type="number" id="editL_ft" style="width: 35px;" onchange="updateSelectedSize()">
                    <input type="number" id="editL_in" style="width: 35px;" max="11" onchange="updateSelectedSize()">
                </div>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="color: #4db8ff;">Elevation (Off Floor)</label><br>
                <input type="number" id="editE_ft" style="width: 40px;" onchange="updateSelectedElevation()"> ft &nbsp;
                <input type="number" id="editE_in" style="width: 40px;" max="11" onchange="updateSelectedElevation()"> in
            </div>
            
            <!-- NEW: Dynamic Door Open/Close Button -->
            <button id="btn-toggle-door" onclick="toggleDoor()" style="background: #e67e22; color: white; margin-bottom: 5px; display: none;">🚪 Open Door</button>
            
            <button onclick="rotateSelected()" style="background: #9b59b6; color: white; margin-bottom: 5px;">Rotate 90° (or press R)</button>
            <button onclick="duplicateSelected()" style="background: #3498db; color: white; margin-bottom: 5px;">Duplicate (or press C)</button>
            
            <button id="btn-texture" onclick="document.getElementById('textureUpload').click()" style="background: #2ecc71; color: white; margin-bottom: 5px; display: none;">🖼️ Upload Pattern</button>
            <input type="file" id="textureUpload" accept="image/*" style="display: none;" onchange="applyTexture(event)">
            
            <button onclick="deleteSelected()" style="background: #e74c3c; color: white;">Delete (or press Del)</button>
        </div>
    </div>
    
    <main id="canvas-container"></main>
    <script src="script.js"></script>
</body>
</html>
