<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Aarna 3D PRO</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
</head>
<body>

    <div id="custom-alert" style="display: none;">
        <span id="alert-text">Notification</span>
        <button onclick="closeAlert()">Got it</button>
    </div>

    <!-- V2.9 FIX: New Top Action Bar -->
    <div id="ui-toggles">
        <button onclick="toggleSidebar()" id="btn-collapse" title="Show/Hide Panel"><i class="fa-solid fa-chevron-left"></i></button>
        <button onclick="switchSide()" id="btn-side" title="Switch Side"><i class="fa-solid fa-arrow-right-arrow-left"></i></button>
        <button onclick="resetCamera()" title="Reset Camera View"><i class="fa-solid fa-video"></i></button>
        <button onclick="showShortcuts()" title="Keyboard Shortcuts"><i class="fa-solid fa-keyboard"></i></button>
    </div>

    <aside id="sidebar" class="expanded">
        <div class="sidebar-header">
            <i class="fa-solid fa-cube logo-icon"></i>
            <span class="logo-text">Studio Aarna</span>
        </div>

        <div class="sidebar-content">
            
            <div class="section-label">ENVIRONMENT</div>
            <div class="env-controls">
                <div class="input-pair">
                    <input type="number" id="roomWidth" value="13" onchange="updateRoom()" title="Width">
                    <span class="x-divider">x</span>
                    <input type="number" id="roomLength" value="10" onchange="updateRoom()" title="Length">
                </div>
                
                <select id="floorStyle" onchange="updateRoom()" title="Floor Style">
                    <option value="white">White Minimal</option>
                    <option value="wood">Hardwood</option>
                    <option value="carpet">Grey Carpet</option>
                    <option value="tile">Ceramic Tile</option>
                    <option value="custom" id="customFloorOption" style="display: none;">Custom Image</option>
                </select>

                <div class="input-pair">
                    <input type="color" id="wallColor" value="#3a404d" onchange="updateRoom()" title="Wall Color">
                    <input type="time" id="timeOfDay" onchange="updateLighting()" title="Time of Day">
                </div>
            </div>

            <div class="section-label">FURNITURE</div>
            <div class="catalog-grid">
                <button class="btn-add color-blue" onclick="addItem('Bed', 6.5, 2, 3, '#AED6F1')"><i class="fa-solid fa-bed"></i><span>Bed</span></button>
                <button class="btn-add color-blue" onclick="addItem('Sofa', 6, 2.5, 2.5, '#7f8c8d')"><i class="fa-solid fa-couch"></i><span>Sofa</span></button>
                <button class="btn-add color-orange" onclick="addItem('Wardrobe', 3, 6, 2, '#F5CBA7')"><i class="fa-solid fa-door-closed"></i><span>Wardrobe</span></button>
                
                <button class="btn-add color-purple" onclick="addItem('TV Stand', 4, 3.5, 1.2, '#333333')"><i class="fa-solid fa-tv"></i><span>TV Stand</span></button>
                <button class="btn-add color-purple" onclick="addItem('Desk', 4, 2.5, 2, '#F9E79F')"><i class="fa-solid fa-laptop"></i><span>Desk</span></button>
                <button class="btn-add color-orange" onclick="addItem('Bookshelf', 3, 6, 1, '#5C4033')"><i class="fa-solid fa-book-open"></i><span>Bookshelf</span></button>

                <button class="btn-add color-pink" onclick="addItem('Dining Table', 5, 2.5, 3, '#D4AC0D')"><i class="fa-solid fa-utensils"></i><span>Table</span></button>
                <button class="btn-add color-pink" onclick="addItem('Chair', 1.5, 3, 1.5, '#2c3e50')"><i class="fa-solid fa-chair"></i><span>Chair</span></button>
                <button class="btn-add color-purple" onclick="addItem('Rug', 5, 0.05, 7, '#D7BDE2', true)"><i class="fa-solid fa-scroll"></i><span>Rug</span></button>
            </div>

            <div class="section-label">PLANTS & DECOR</div>
            <div class="catalog-grid">
                <button class="btn-add color-green" onclick="addItem('Small Plant', 0.6, 0.8, 0.6, '#27ae60')"><i class="fa-brands fa-envira"></i><span>Small Plant</span></button>
                <button class="btn-add color-green" onclick="addItem('Medium Plant', 1.0, 2.0, 1.0, '#27ae60')"><i class="fa-solid fa-leaf"></i><span>Med Plant</span></button>
                <button class="btn-add color-green" onclick="addItem('Large Plant', 1.5, 4.0, 1.5, '#27ae60')"><i class="fa-solid fa-tree"></i><span>Large Tree</span></button>
                
                <button class="btn-add color-gold" onclick="addItem('Floor Mirror', 2.0, 5.5, 0.1, '#d4af37')"><i class="fa-solid fa-up-right-and-down-left-from-center"></i><span>Mirror</span></button>
                <button class="btn-add color-blue" onclick="addItem('Poster', 2, 3, 0.05, '#ffffff', true)"><i class="fa-solid fa-image"></i><span>Poster</span></button>
                <button class="btn-add color-blue" onclick="addItem('Curtains', 5, 7, 0.3, '#ffffff', true)"><i class="fa-solid fa-person-booth"></i><span>Curtains</span></button>
                
                <button class="btn-add color-gold" onclick="addItem('Wall Light', 1, 1, 0.2, '#ffffff', true)"><i class="fa-solid fa-lightbulb"></i><span>Wall Light</span></button>
                <button class="btn-add color-gold" onclick="addItem('Ceiling Fan', 3, 1, 3, '#333333', true)"><i class="fa-solid fa-fan"></i><span>Fan</span></button>
            </div>

            <div class="section-label">ARCHITECTURE</div>
            <div class="catalog-grid">
                <button class="btn-add color-cyan" onclick="addItem('Wood Door', 3, 7, 0.2, '#5C4033', true)"><i class="fa-solid fa-door-open"></i><span>Wood Door</span></button>
                <button class="btn-add color-cyan" onclick="addItem('Glass Door', 4, 7, 0.2, '#3498db', true)"><i class="fa-brands fa-windows"></i><span>Glass Door</span></button>
                <button class="btn-add color-cyan" onclick="addItem('Window', 4, 4, 0.2, '#3498db', true)"><i class="fa-solid fa-border-all"></i><span>Window</span></button>
                <button class="btn-add color-cyan" onclick="addItem('Balcony', 10, 0.2, 4, '#bdc3c7', true)"><i class="fa-solid fa-layer-group"></i><span>Balcony</span></button> 
            </div>

            <div class="section-label">SYSTEM</div>
            <button class="sys-btn" onclick="exportBlueprint()"><i class="fa-solid fa-camera"></i> Render Snapshot</button>
            <button class="sys-btn" onclick="saveRoom()"><i class="fa-solid fa-floppy-disk"></i> Save Room</button>
            <button class="sys-btn" onclick="copyShareLink()"><i class="fa-solid fa-link"></i> Share Link</button>
            <button class="sys-btn danger-btn" onclick="clearCanvas()"><i class="fa-solid fa-trash"></i> Clear Room</button>
        </div>
    </aside>
    
    <div id="inspector" style="display: none;">
        <h3><i class="fa-solid fa-pen-to-square"></i> Edit Item</h3>
        <p id="selectedItemName">Item Name</p>
        
        <div class="size-inputs">
            <div><label>W</label><input type="number" id="editW_ft" onchange="updateSelectedSize()"></div>
            <div><label>H</label><input type="number" id="editH_ft" onchange="updateSelectedSize()"></div>
            <div><label>L</label><input type="number" id="editL_ft" onchange="updateSelectedSize()"></div>
        </div>

        <label style="margin-top: 10px;">Elevation (ft)</label>
        <input type="number" id="editE_ft" onchange="updateSelectedElevation()">

        <label style="margin-top: 10px;">Rotation: <span id="rotDisplay">0°</span></label>
        <input type="range" id="editRot" min="0" max="360" value="0" oninput="updateSelectedRotation()" style="width: 100%;">
        
        <button class="sys-btn" id="btn-toggle-door" onclick="toggleDoor()" style="display: none; margin-top: 15px;"><i class="fa-solid fa-door-open"></i> Toggle Door</button>
        <button class="sys-btn" onclick="duplicateSelected()" style="margin-top: 10px;"><i class="fa-solid fa-copy"></i> Duplicate</button>
        
        <button class="sys-btn" id="btn-texture" onclick="document.getElementById('textureUpload').click()" style="display: none; margin-top: 10px; background: #8e44ad; border-color: #9b59b6;"><i class="fa-solid fa-image"></i> Texture</button>
        <input type="file" id="textureUpload" accept="image/*" style="display: none;" onchange="applyTexture(event)">
        
        <button class="sys-btn danger-btn" onclick="deleteSelected()" style="margin-top: 10px;"><i class="fa-solid fa-trash-can"></i> Delete</button>
    </div>
    
    <main id="canvas-container"></main>

    <script src="state.js"></script>
    <script src="ui.js"></script>
    <script src="factory.js"></script>
    <script src="physics.js"></script>
    <script src="main.js"></script>
</body>
</html>
